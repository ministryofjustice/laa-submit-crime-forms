
name: Update ClamAV definitions

on:
  schedule:
    # Dev
    - cron: '0 */3 * * *'
    - cron: '15 */3 * * *'

    # UAT (10 min offset)
    - cron: '10 */3 * * *'
    - cron: '25 */3 * * *'

    # Prod (20 min offset)
    - cron: '20 */3 * * *'
    - cron: '35 */3 * * *'

jobs:
  update_dev:
    if: github.event.schedule == '0 */3 * * *' || github.event.schedule == '15 */3 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run freshclam (dev)
        uses: ./.github/actions/run-freshclam
        with:
          k8s_cluster: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_DEV_K8S_CLUSTER_NAME }}
          k8s_cluster_cert: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_DEV_K8S_CLUSTER_CERT }}
          k8s_namespace: laa-submit-crime-forms-dev
          k8s_token: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_DEV_K8S_TOKEN }}

  update_uat:
    if: github.event.schedule == '10 */3 * * *' || github.event.schedule == '25 */3 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run freshclam (uat)
        uses: ./.github/actions/run-freshclam
        with:
          k8s_cluster: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_UAT_K8S_CLUSTER_NAME }}
          k8s_cluster_cert: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_UAT_K8S_CLUSTER_CERT }}
          k8s_namespace: laa-submit-crime-forms-uat
          k8s_token: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_UAT_K8S_TOKEN }}

  update_prod:
    if: github.event.schedule == '20 */3 * * *' || github.event.schedule == '35 */3 * * *'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run freshclam (prod)
        uses: ./.github/actions/run-freshclam
        with:
          k8s_cluster: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_PROD_K8S_CLUSTER_NAME }}
          k8s_cluster_cert: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_PROD_K8S_CLUSTER_CERT }}
          k8s_namespace: laa-submit-crime-forms-prod
          k8s_token: ${{ secrets.AUTOGENERATED_SUBMIT_FORMS_PROD_K8S_TOKEN }}
