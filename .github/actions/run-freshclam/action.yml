name: "Run freshclam"
description: 'Runs freshclam on a clamav pod in the given K8S cluster and namespace'
inputs:
  k8s_cluster:
    description: "Kubernetes cluster name"
    required: true
  k8s_cluster_cert:
    description: "Kubernetes cluster certificate"
    required: true
  k8s_namespace:
    description: "Kubernetes cluster namespace"
    required: true
  k8s_token:
    description: "Kubernetes authentication token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Mask sensitive inputs
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.k8s_token }}"
        echo "::add-mask::${{ inputs.k8s_cluster_cert }}"

    - name: Authenticate to the cluster
      id: authenticate_to_cluster
      shell: bash
      env:
        K8S_CLUSTER: ${{ inputs.k8s_cluster }}
        K8S_CLUSTER_CERT: ${{ inputs.k8s_cluster_cert }}
        K8S_NAMESPACE: ${{ inputs.k8s_namespace }}
        K8S_TOKEN: ${{ inputs.k8s_token }}
      run: |
        echo "${K8S_CLUSTER_CERT}" > ./ca.crt
        kubectl config set-cluster ${K8S_CLUSTER} --certificate-authority=./ca.crt --server=https://${K8S_CLUSTER}
        kubectl config set-credentials circleci --token=${K8S_TOKEN}
        kubectl config set-context ${K8S_CLUSTER} --cluster=${K8S_CLUSTER} --user=circleci --namespace=${K8S_NAMESPACE}
        kubectl config use-context ${K8S_CLUSTER}

    - name: Run freshclam across all pods
      shell: bash
      run: |
        set -euo pipefail

        echo "Discovering ClamAV pods..."
        PODS=$(kubectl get pods -l app=submit-crime-forms-clamav -o jsonpath="{.items[*].metadata.name}")

        if [ -z "$PODS" ]; then
          echo "ERROR: No ClamAV pods found"
          exit 1
        fi

        echo "Pods found:"
        for P in $PODS; do
          echo " - $P"
        done

        TOTAL=0
        SUCCESS=0
        FAIL=0

        for POD in $PODS; do
          TOTAL=$((TOTAL+1))
          echo "========================================"
          echo "Processing pod: $POD"

          if kubectl exec "$POD" -- sh -lc '
            set -e

            echo "Preparing temporary config (removing UpdateLogFile to avoid lock issues)..."
            TMP_CONF=$(mktemp)

            if [ -f /etc/clamav/freshclam.conf ]; then
              grep -v "^[[:space:]]*UpdateLogFile" /etc/clamav/freshclam.conf > "$TMP_CONF" || true
            else
              echo "WARNING: freshclam.conf not found, run with defaults"
              TMP_CONF=""
            fi

            echo "Attempting freshclam update (will not fail if already running)..."

            if [ -n "$TMP_CONF" ]; then
              timeout 120s freshclam --config-file="$TMP_CONF" --stdout --foreground || true
            else
              timeout 120s freshclam --stdout --foreground || true
            fi

            echo "freshclam execution completed"
            exit 0

          '; then
            echo "SUCCESS: $POD"
            SUCCESS=$((SUCCESS+1))
          else
            echo "FAILURE: $POD"
            FAIL=$((FAIL+1))
          fi

          kubectl exec "$POD" -- sh -lc '
          echo "Definition timestamps:"
          stat -c "%y %n" /var/lib/clamav/*.cvd 2>/dev/null || echo "No .cvd files found"
          '
        done

        echo "========================================"
        echo "Summary:"
        echo "  Total pods: $TOTAL"
        echo "  Successes:  $SUCCESS"
        echo "  Failures:   $FAIL"

        if [ "$SUCCESS" -eq "$TOTAL" ]; then
          echo "Overall result: SUCCESS (all pods updated)"
          exit 0
        else
          echo "Overall result: FAILURE ($FAIL pod(s) failed)"
          exit 1
        fi
