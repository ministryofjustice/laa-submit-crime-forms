{{- if .Values.ingress.enabled -}}
{{- $fullName := include "laa-submit-crime-forms.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- if and .Values.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) }}
  {{- if not (hasKey .Values.ingress.annotations "kubernetes.io/ingress.class") }}
  {{- $_ := set .Values.ingress.annotations "kubernetes.io/ingress.class" .Values.ingress.className}}
  {{- end }}
{{- end }}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "laa-submit-crime-forms.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ include "laa-submit-crime-forms.whitelist" $ }}"
    nginx.ingress.kubernetes.io/default-backend: nginx-errors
    nginx.ingress.kubernetes.io/custom-http-errors: "423"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyNoFilesLimit 524288
      SecRequestBodyLimit 104857600
      SecDefaultAction "phase:2,pass,log,tag:github_team=laa-crime-forms-team,status:423"
      SecDefaultAction "phase:4,pass,log,tag:github_team=laa-crime-forms-team,status:423"
      SecRule ARGS_NAMES "@streq search_form[search_string]" "id:1001101,phase:1,pass,nolog,t:none,ctl:auditEngine=Off"
      SecRule REQUEST_BODY "@rx ." "id:1001102,phase:2,pass,nolog,ctl:auditEngine=Off"
      SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=25"
      SecRuleRemoveById 920120
      SecRuleRemoveById 921110
      SecRuleRemoveById 933210
      SecRuleRemoveById 942230
      SecRuleRemoveById 951120
      SecRuleRemoveById 951220
      SecRuleRemoveById 952100
      SecRuleUpdateTargetById 932115 "!ARGS"
      SecRuleUpdateTargetById 932380 "!ARGS"
      SecRule REQUEST_URI "@endsWith /steps/reason_why" "id:1001001,phase:1,pass,log,msg:\"Excluding RCE rules (932230/235/250) for reason_why[reason_why]\",ctl:ruleRemoveTargetById=932230;ARGS:prior_authority_steps_reason_why_form[reason_why],ctl:ruleRemoveTargetById=932235;ARGS:prior_authority_steps_reason_why_form[reason_why],ctl:ruleRemoveTargetById=932250;ARGS:prior_authority_steps_reason_why_form[reason_why]"
      SecRule REQUEST_URI "@endsWith /steps/alternative_quotes" "id:1001002,phase:1,pass,log,msg:\"Excluding RCE rules (932230/235/250) for alternative_quotes[no_alternative_quote_reason]\",ctl:ruleRemoveTargetById=932230;ARGS:prior_authority_steps_alternative_quotes_overview_form[no_alternative_quote_reason],ctl:ruleRemoveTargetById=932235;ARGS:prior_authority_steps_alternative_quotes_overview_form[no_alternative_quote_reason],ctl:ruleRemoveTargetById=932250;ARGS:prior_authority_steps_alternative_quotes_overview_form[no_alternative_quote_reason]"
      SecRule REQUEST_URI "@endsWith /steps/other_info" "id:1001004,phase:1,pass,log,msg:\"Excluding RCE rules (932230/235/250) for other_info[other_info]\",ctl:ruleRemoveTargetById=932230;ARGS:nsm_steps_other_info_form[other_info],ctl:ruleRemoveTargetById=932235;ARGS:nsm_steps_other_info_form[other_info],ctl:ruleRemoveTargetById=932250;ARGS:nsm_steps_other_info_form[other_info]"
      SecRule REQUEST_URI "@endsWith /steps/other_info" "id:1001005,phase:1,pass,log,msg:\"Excluding RCE rules (932230/235/250) for other_info[conclusion]\",ctl:ruleRemoveTargetById=932230;ARGS:nsm_steps_other_info_form[conclusion],ctl:ruleRemoveTargetById=932235;ARGS:nsm_steps_other_info_form[conclusion],ctl:ruleRemoveTargetById=932250;ARGS:nsm_steps_other_info_form[conclusion]"
      SecRule REQUEST_URI "@endsWith /steps/other_info" "id:1001006,phase:1,pass,log,msg:\"Raising anomaly threshold to 30 for /steps/other_info\",setvar:tx.inbound_anomaly_score_threshold=30"
    external-dns.alpha.kubernetes.io/aws-weight: "100"
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and .Values.ingress.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if and .pathType (semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion) }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: {{ $svcPort }}
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
